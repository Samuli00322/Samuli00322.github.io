<html>
    <head>

        <style>
             /* Tämä on CSS animaatio */
             /*img {
             filter: grayscale(100%);
             }*/
             
            
            a {
            color: blue;
            text-decoration: none;
            transition: 0.3s;
            }

            a:hover {
            color: darkorange;
            text-decoration: underline;
            }
            
            
            #para1 {
                color: sandybrown;
            }
            p { text-align: center;
            font-size: 30px;
        }
        * {
      color: rgb(92, 241, 5);
    }
    h1 { text-align: center;}
    h1 {
      font-size: 4em; padding-bottom: 10%;
    }

    .transition-button {
        background-color: rgb(238, 241, 6);
        padding: 10px 20px;
        border: none;
        cursor: pointer;
       position: absolute;
       top: 50%;
       left: 70%;
        align-items: center;
        transition: background-color 0.3s ease;
    
      }
      
      .transition-button:hover {
        background-color: rgb(4, 235, 16);
       }

      .animation-box {
        position: absolute;
        top: 50%;
        left: 70%;
        width: 50px;
        height: 50px;
        background-color: rgb(238, 241, 6);
        position: relative;
        animation: move 2s infinite alternate;
      }
      
      @keyframes move {
        from {
          left: 0;
        }
        to {
          left: 100px;
        }
      }

      .pseudo-list li:nth-child(odd) {
        background-color: rgb(227, 243, 7);
      }
      
      .pseudo-list li:nth-child(even) {
        background-color: rgb(3, 7, 238);
      }
      .filter-image {
        filter: grayscale(100%);
        transition: filter 0.3s ease;
      }
      
      .filter-image:hover {
        filter: grayscale(0%);
      }

      .quote {
        position: relative;
        padding-left: 20px;
        font-style: italic;
      }
      
      .quote::before {
        content: '“';
        font-size: 40px;
        position: absolute;
        left: 0;
        top: 0;
        color: lightgray;
      }

    </style>
    </head>
